<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container my-4">
    <form method="POST" action="export.php">
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4>Informations personnelles</h4>
                        <input class="form-control mb-2 champ-cv" name="prenom" placeholder="Prénom">
                        <input class="form-control mb-2 champ-cv" name="nom" placeholder="Nom">
                        <input class="form-control mb-2 champ-cv" name="headline" placeholder="Titre professionnel">
                        <input class="form-control mb-2 champ-cv" name="email" placeholder="Email">
                        <input class="form-control mb-2 champ-cv" name="telephone" placeholder="Téléphone">
                        <textarea class="form-control mb-3 champ-cv" name="resume" placeholder="Résumé"></textarea>
                        <hr>
                        <h5>Expériences</h5>
                        <div id="bloc-experiences"></div>
                        <button type="button" id="btn-ajout-experience" class="btn btn-outline-primary btn-sm mb-3">
                            + Ajouter une expérience
                        </button>
                        <h5>Formations</h5>
                        <div id="bloc-formations"></div>
                        <button type="button" id="btn-ajout-formation" class="btn btn-outline-primary btn-sm mb-3">
                            + Ajouter une formation
                        </button>
                        <h5>Compétences</h5>
                        <div id="bloc-competences"></div>
                        <button type="button" id="btn-ajout-competence" class="btn btn-outline-primary btn-sm mb-3">
                            + Ajouter une compétence
                        </button>
                        <button type="submit" class="btn btn-success w-100">
                            Télécharger le CV en PDF
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-body">
                        <h2 id="apercu-nom">Prénom Nom</h2>
                        <h5 id="apercu-titre" class="text-muted"></h5>
                        <p id="apercu-contact" class="small"></p>
                        <hr>
                        <p id="apercu-resume"></p>
                        <h5>Expériences</h5>
                        <div id="apercu-experiences"></div>
                        <h5 class="mt-3">Formations</h5>
                        <div id="apercu-formations"></div>
                        <h5 class="mt-3">Compétences</h5>
                        <ul id="apercu-competences"></ul>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
<script src="script.js"></script>
</body>
</html>
