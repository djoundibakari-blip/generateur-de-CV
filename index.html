<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container-fluid py-4">

    <h2 class="text-center fw-bold mb-1">Générateur de CV</h2>
    <p class="text-center text-secondary mb-4">Créez votre CV professionnel en quelques minutes</p>

    <div class="row g-4">
        <div class="col-md-6">
            <form id="formulaire-cv" action="export.php" method="post" class="card p-3 shadow-sm">

                <h4 class="fw-bold mb-3">Informations générales</h4>
                <input class="form-control mb-2 champ-cv" name="prenom" placeholder="Prénom">
                <input class="form-control mb-2 champ-cv" name="nom" placeholder="Nom">
                <input class="form-control mb-2 champ-cv" name="headline" placeholder="Titre professionnel">
                <input class="form-control mb-2 champ-cv" name="email" placeholder="Email">
                <input class="form-control mb-2 champ-cv" name="telephone" placeholder="Téléphone">
                <textarea class="form-control mb-3 champ-cv" name="resume" placeholder="Résumé professionnel"></textarea>

                <h4 class="fw-bold mb-2">Expériences</h4>
                <div id="bloc-experiences"></div>
                <button type="button" class="btn btn-outline-secondary mb-3 w-100" id="btn-ajout-experience">Ajouter une expérience</button>

                <h4 class="fw-bold mb-2">Formations</h4>
                <div id="bloc-formations"></div>
                <button type="button" class="btn btn-outline-secondary mb-3 w-100" id="btn-ajout-formation">Ajouter une formation</button>

                <h4 class="fw-bold mb-2">Compétences</h4>
                <div id="bloc-competences"></div>
                <button type="button" class="btn btn-outline-secondary mb-3 w-100" id="btn-ajout-competence">Ajouter une compétence</button>

                <button type="submit" class="btn btn-primary btn-lg w-100">Télécharger le CV</button>
                
            </form>
        </div>

        <div class="col-md-6">
            <div class="aperçu-cv card p-3 shadow-sm">

                <h1 id="apercu-nom">Prénom Nom</h1>
                <div class="titre-pro fw-bold" id="apercu-titre">Titre professionnel</div>
                <div id="apercu-contact" class="text-secondary mb-3">email | téléphone</div>

                <h5 class="mt-3">Profil</h5>
                <p id="apercu-resume"></p>

                <h5 class="mt-3">Expériences</h5>
                <div id="apercu-experiences"></div>

                <h5 class="mt-3">Formations</h5>
                <div id="apercu-formations"></div>

                <h5 class="mt-3">Compétences</h5>
                <ul id="apercu-competences"></ul>
            </div>
        </div>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
