<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f5; }
        .aperçu-cv {
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            min-height: 100%;
        }
        .aperçu-cv h1 { font-size: 24px; margin-bottom: 0; }
        .titre-pro { font-weight: bold; }
        .aperçu-cv h2 {
            font-size: 16px;
            border-bottom: 1px solid #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-6">
            <form id="formulaire-cv" action="export.php" method="post">
                <h3>Informations générales</h3>
                <input class="form-control mb-2 champ-cv" name="prenom" placeholder="Prénom">
                <input class="form-control mb-2 champ-cv" name="nom" placeholder="Nom">
                <input class="form-control mb-2 champ-cv" name="headline" placeholder="Titre professionnel">
                <input class="form-control mb-2 champ-cv" name="email" placeholder="Email">
                <input class="form-control mb-2 champ-cv" name="telephone" placeholder="Téléphone">
                <textarea class="form-control mb-3 champ-cv" name="resume" placeholder="Résumé professionnel"></textarea>
                <h3>Expériences</h3>
                <div id="bloc-experiences"></div>
                <button type="button" class="btn btn-secondary mb-3" id="btn-ajout-experience">
                    Ajouter une expérience
                </button>
                <h3>Formations</h3>
                <div id="bloc-formations"></div>
                <button type="button" class="btn btn-secondary mb-3" id="btn-ajout-formation">
                    Ajouter une formation
                </button>
                <h3>Compétences</h3>
                <div id="bloc-competences"></div>
                <button type="button" class="btn btn-secondary mb-3" id="btn-ajout-competence">
                    Ajouter une compétence
                </button>
                <button class="btn btn-primary btn-lg w-100">Télécharger le CV</button>
            </form>
        </div>
        <div class="col-md-6">
            <div class="aperçu-cv">
                <h1 id="apercu-nom">Prénom Nom</h1>
                <div class="titre-pro" id="apercu-titre">Titre professionnel</div>
                <div id="apercu-contact">email | téléphone</div>
                <h2>Profil</h2>
                <p id="apercu-resume"></p>
                <h2>Expériences</h2>
                <div id="apercu-experiences"></div>
                <h2>Formations</h2>
                <div id="apercu-formations"></div>
                <h2>Compétences</h2>
                <ul id="apercu-competences"></ul>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
