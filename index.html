<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de CV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .preview {
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            min-height: 100%;
        }
        .preview h1 {
            font-size: 24px;
            margin-bottom: 0;
        }
        .preview .headline {
            font-weight: bold;
        }
        .preview h2 {
            font-size: 16px;
            border-bottom: 1px solid #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-6">
            <form action="export.php" method="post" id="cvForm">

                <h3>Informations générales</h3>

                <div class="mb-2">
                    <input type="text" class="form-control" name="prenom" placeholder="Prénom" oninput="updatePreview()">
                </div>
                <div class="mb-2">
                    <input type="text" class="form-control" name="nom" placeholder="Nom" oninput="updatePreview()">
                </div>
                <div class="mb-2">
                    <input type="text" class="form-control" name="headline" placeholder="Titre professionnel" oninput="updatePreview()">
                </div>
                <div class="mb-2">
                    <input type="email" class="form-control" name="email" placeholder="Email" oninput="updatePreview()">
                </div>
                <div class="mb-2">
                    <input type="text" class="form-control" name="telephone" placeholder="Téléphone" oninput="updatePreview()">
                </div>
                <div class="mb-3">
                    <textarea class="form-control" name="resume" placeholder="Résumé professionnel" rows="3" oninput="updatePreview()"></textarea>
                </div>

                <h3>Expériences professionnelles</h3>
                <div id="experiences"></div>
                <button type="button" class="btn btn-secondary mb-3" onclick="addExperience()">Ajouter une expérience</button>

                <h3>Formations</h3>
                <div id="formations"></div>
                <button type="button" class="btn btn-secondary mb-3" onclick="addFormation()">Ajouter une formation</button>

                <h3>Compétences</h3>
                <div id="competences"></div>
                <button type="button" class="btn btn-secondary mb-3" onclick="addCompetence()">Ajouter une compétence</button>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Télécharger le CV en PDF</button>
                </div>

            </form>
        </div>

        <div class="col-md-6">
            <div class="preview" id="preview">
                <h1 id="p_nom">Prénom Nom</h1>
                <div class="headline" id="p_headline">Titre professionnel</div>
                <div id="p_contact">email@example.com | 06 00 00 00 00</div>

                <h2>Profil</h2>
                <p id="p_resume">Résumé professionnel</p>

                <h2>Expériences professionnelles</h2>
                <div id="p_experiences"></div>

                <h2>Formations</h2>
                <div id="p_formations"></div>

                <h2>Compétences</h2>
                <ul id="p_competences"></ul>
            </div>
        </div>
    </div>
</div>

<script>
function updatePreview() {
    const prenom = document.querySelector('[name="prenom"]').value;
    const nom = document.querySelector('[name="nom"]').value;
    const headline = document.querySelector('[name="headline"]').value;
    const email = document.querySelector('[name="email"]').value;
    const telephone = document.querySelector('[name="telephone"]').value;
    const resume = document.querySelector('[name="resume"]').value;

    document.getElementById('p_nom').innerText = prenom + ' ' + nom;
    document.getElementById('p_headline').innerText = headline;
    document.getElementById('p_contact').innerText = email + ' | ' + telephone;
    document.getElementById('p_resume').innerText = resume;

    renderExperiences();
    renderFormations();
    renderCompetences();
}

function addExperience() {
    const container = document.getElementById('experiences');
    container.innerHTML += `
        <div class="border p-2 mb-2">
            <input type="text" class="form-control mb-1" name="poste[]" placeholder="Poste" oninput="updatePreview()">
            <input type="text" class="form-control mb-1" name="entreprise[]" placeholder="Entreprise" oninput="updatePreview()">
            <input type="text" class="form-control mb-1" name="debut_exp[]" placeholder="Date de début" oninput="updatePreview()">
            <input type="text" class="form-control mb-1" name="fin_exp[]" placeholder="Date de fin" oninput="updatePreview()">
            <textarea class="form-control" name="description_exp[]" placeholder="Description" oninput="updatePreview()"></textarea>
        </div>
    `;
}

function addFormation() {
    const container = document.getElementById('formations');
    container.innerHTML += `
        <div class="border p-2 mb-2">
            <input type="text" class="form-control mb-1" name="diplome[]" placeholder="Diplôme" oninput="updatePreview()">
            <input type="text" class="form-control mb-1" name="ecole[]" placeholder="Établissement" oninput="updatePreview()">
            <input type="text" class="form-control mb-1" name="debut_form[]" placeholder="Date de début" oninput="updatePreview()">
            <input type="text" class="form-control mb-1" name="fin_form[]" placeholder="Date de fin" oninput="updatePreview()">
        </div>
    `;
}

function addCompetence() {
    const container = document.getElementById('competences');
    container.innerHTML += `
        <div class="border p-2 mb-2">
            <input type="text" class="form-control mb-1" name="competence[]" placeholder="Compétence" oninput="updatePreview()">
            <input type="text" class="form-control" name="niveau[]" placeholder="Niveau" oninput="updatePreview()">
        </div>
    `;
}

function renderExperiences() {
    const postes = document.querySelectorAll('[name="poste[]"]');
    const entreprises = document.querySelectorAll('[name="entreprise[]"]');
    const debuts = document.querySelectorAll('[name="debut_exp[]"]');
    const fins = document.querySelectorAll('[name="fin_exp[]"]');
    const descs = document.querySelectorAll('[name="description_exp[]"]');

    let html = '';
    for (let i = 0; i < postes.length; i++) {
        html += `<div><strong>${postes[i].value}</strong> - ${entreprises[i].value} (${debuts[i].value} - ${fins[i].value})<br>${descs[i].value}</div>`;
    }
    document.getElementById('p_experiences').innerHTML = html;
}

function renderFormations() {
    const diplomes = document.querySelectorAll('[name="diplome[]"]');
    const ecoles = document.querySelectorAll('[name="ecole[]"]');
    const debuts = document.querySelectorAll('[name="debut_form[]"]');
    const fins = document.querySelectorAll('[name="fin_form[]"]');

    let html = '';
    for (let i = 0; i < diplomes.length; i++) {
        html += `<div><strong>${diplomes[i].value}</strong> - ${ecoles[i].value} (${debuts[i].value} - ${fins[i].value})</div>`;
    }
    document.getElementById('p_formations').innerHTML = html;
}

function renderCompetences() {
    const competences = document.querySelectorAll('[name="competence[]"]');
    const niveaux = document.querySelectorAll('[name="niveau[]"]');

    let html = '';
    for (let i = 0; i < competences.length; i++) {
        html += `<li>${competences[i].value} (${niveaux[i].value})</li>`;
    }
    document.getElementById('p_competences').innerHTML = html;
}
</script>

</body>
</html>
